blueprint:
  name: Reolink Doorbell 2-Way Intercom (Low-Latency)
  description: >
    Opens a Browser Mod popup with live video and 2-way audio when the doorbell
    rings. Video is served via a go2rtc stream (no RTSP credentials stored in the
    dashboard). Requires: WebRTC Camera (custom:webrtc-camera), Browser Mod, and
    HTTPS access to Home Assistant (mic needs a secure context).
  domain: automation
  source_url: https://github.com/YOURNAME/reolink-intercom/blob/main/blueprints/reolink_2way_intercom.yaml
  input:
    ring_sensor:
      name: Ring / Visitor sensor
      description: The binary_sensor that turns 'on' when the doorbell is pressed.
      selector:
        entity:
          domain: binary_sensor
    go2rtc_stream:
      name: go2rtc stream name
      description: >
        The stream name defined in your go2rtc.yaml (e.g. reolink_doorbell).
        The webrtc-camera card will reference this, so no RTSP password is
        stored in the automation.
      default: reolink_doorbell
      selector:
        text:
    target_browsers:
      name: Target browser(s)
      description: The Browser Mod browser_id(s) of the tablet(s) to show the popup on.
      selector:
        text:
          multiple: true
    unlock_script:
      name: Door unlock script (optional)
      description: Script run when the unlock button is tapped. Leave empty to hide the button.
      default: ""
      selector:
        entity:
          domain: script
    auto_close_timeout:
      name: Auto-close timeout (minutes)
      description: Close the popup automatically this many minutes after the ring.
      default: 2
      selector:
        number:
          min: 1
          max: 10
          unit_of_measurement: min
          mode: slider

mode: single
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input ring_sensor
    from: "off"
    to: "on"

variables:
  stream_name: !input go2rtc_stream
  unlock: !input unlock_script

actions:
  - action: browser_mod.popup
    data:
      browser_id: !input target_browsers
      size: wide
      dismissable: true
      style: |-
        ha-dialog {
          --mdc-dialog-min-width: 600px !important;
        }
        .content { width: auto !important; }
      content:
        type: picture-elements
        card_mod:
          style: |
            #root { height: 420px }
        image: https://upload.wikimedia.org/wikipedia/commons/c/ca/1x1.png
        elements:
          # Live video + 2-way audio
          - type: custom:webrtc-camera
            ui: true
            url: "{{ stream_name }}"
            media: video,audio,microphone
            mode: webrtc
            style:
              position: absolute
              top: 50%
              left: 50%
              width: 100%
              height: 100%
            card_mod:
              style: |
                .fullscreen {display: none}
                .screenshot {display: none}
                .pictureinpicture {display: none}
                video {aspect-ratio: 16/9}
          # Hang up
          - type: icon
            icon: mdi:phone-off
            tap_action:
              action: call-service
              service: browser_mod.close_popup
            style:
              left: 85%
              bottom: 0
              background-color: "#f44336"
              color: white
              padding: 14px
              border-radius: 50px
              display: inline-flex
              align-items: center
              cursor: pointer
              z-index: 1
          # Unlock (only if a script was provided)
          - type: conditional
            conditions:
              - condition: template
                value_template: "{{ unlock != '' }}"
            elements:
              - type: icon
                icon: mdi:lock-open
                tap_action:
                  action: call-service
                  service: script.turn_on
                  service_data:
                    entity_id: "{{ unlock }}"
                style:
                  left: 50%
                  bottom: 0
                  background-color: "#2196F3"
                  color: white
                  padding: 14px
                  border-radius: 50px
                  display: inline-flex
                  align-items: center
                  cursor: pointer
                  z-index: 1

  # Keep popup open until the ring clears, then a short grace period
  - wait_template: "{{ is_state(trigger.entity_id, 'off') }}"
    timeout:
      minutes: !input auto_close_timeout
    continue_on_timeout: true

  - action: browser_mod.close_popup
    data:
      browser_id: !input target_browsers
